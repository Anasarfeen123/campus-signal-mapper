<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Leaderboard · VIT Signal Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#020510">
<meta name="description" content="Top contributors to the VIT Chennai Signal Mapper project.">
<style>
:root {
  --bg:#020510; --card-bg:rgba(2,8,25,0.88);
  --border:rgba(255,255,255,0.07); --border-accent:rgba(0,240,255,0.15);
  --cyan:#00f0ff; --cyan-glow:rgba(0,240,255,0.5);
  --blue:#2060ff; --purple:#8040ff; --green:#00ff88;
  --amber:#ffaa00; --red:#ff3355; --gold:#ffd700;
  --silver:#c0c0c0; --bronze:#cd7f32;
  --text:#d8e4f0; --text-bright:#fff; --dim:#3a4a5e;
  --mono:'JetBrains Mono',monospace;
  --display:'Rajdhani',sans-serif;
  --body:'Inter',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:dark}
body{
  min-height:100vh; font-family:var(--body); color:var(--text); background:var(--bg);
  background-image:
    radial-gradient(ellipse 60% 50% at 15% 0%,rgba(32,96,255,0.14) 0%,transparent 60%),
    radial-gradient(ellipse 40% 45% at 85% 100%,rgba(128,64,255,0.1) 0%,transparent 60%);
  display:flex; flex-direction:column; align-items:center;
  padding:0 16px 40px;
}
body::after{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);
}

/* ── SKIP LINK ── */
.skip-link{
  position:fixed;top:-100px;left:16px;z-index:99999;
  background:var(--cyan);color:#000;
  padding:8px 16px;border-radius:0 0 4px 4px;
  font-family:var(--mono);font-size:.75rem;font-weight:700;
  transition:top .2s;
}
.skip-link:focus{top:0}

/* ── NAV ── */
nav.topbar{
  width:100%; max-width:680px; position:relative; z-index:1;
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 0 0;
}
.nav-links{ display:flex; gap:0; border:1px solid var(--border-accent); border-radius:3px; overflow:hidden }
.nav-link{
  padding:7px 13px; font-family:var(--mono); font-size:.58rem;
  letter-spacing:.8px; text-decoration:none; color:var(--dim);
  text-transform:uppercase; border-right:1px solid var(--border-accent);
  transition:color .15s, background .15s;
}
.nav-link:last-child{border-right:none}
.nav-link:hover{color:var(--text);background:rgba(0,240,255,0.04)}
.nav-link.active{color:var(--cyan);background:rgba(0,240,255,0.06);text-shadow:0 0 8px var(--cyan-glow)}
.nav-link:focus-visible{outline:2px solid var(--cyan);outline-offset:-2px}

.nav-right{display:flex;align-items:center;gap:8px}
.lang-btn{
  padding:5px 10px;background:rgba(0,240,255,0.05);
  border:1px solid rgba(0,240,255,0.15);border-radius:2px;
  color:rgba(0,240,255,0.65);font-family:var(--mono);font-size:.6rem;
  font-weight:600;letter-spacing:.5px;cursor:pointer;
  transition:background .15s,color .15s;
}
.lang-btn:hover{background:rgba(0,240,255,0.1);color:var(--cyan)}
.lang-btn:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

/* ── CARD ── */
.card{
  width:100%; max-width:680px; position:relative; z-index:1;
  background:var(--card-bg);
  backdrop-filter:blur(32px) saturate(1.8);
  -webkit-backdrop-filter:blur(32px) saturate(1.8);
  border:1px solid var(--border); border-radius:4px;
  overflow:hidden;
  box-shadow:0 0 0 1px rgba(0,240,255,0.04) inset,0 40px 80px rgba(0,0,0,.85),0 0 60px rgba(0,240,255,0.05);
  margin-top:18px;
  animation:rise .5s cubic-bezier(.22,1,.36,1) both;
}
.card::before,.card::after{
  content:'';position:absolute;width:14px;height:14px;
  border-color:var(--cyan);border-style:solid;z-index:3;
}
.card::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
.card::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

.scan-line{
  height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  opacity:.6;animation:scan 3s ease-in-out infinite;
}
@keyframes scan{0%,100%{opacity:.35}50%{opacity:.75}}

/* ── HEADER ── */
.card-head{
  padding:20px 24px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;
  background:linear-gradient(135deg,rgba(32,96,255,0.07),rgba(128,64,255,0.04),transparent);
}
.card-head h1{
  font-family:var(--display);font-size:1.5rem;font-weight:700;
  letter-spacing:2.5px;text-transform:uppercase;color:var(--text-bright);
  text-shadow:0 0 24px var(--cyan-glow);
}
.head-sub{
  font-family:var(--mono);font-size:.58rem;color:var(--dim);
  letter-spacing:1px;margin-top:5px;text-transform:uppercase;
}
.refresh-btn{
  padding:6px 12px;background:transparent;
  border:1px solid rgba(0,240,255,0.18);border-radius:2px;
  color:rgba(0,240,255,0.5);font-family:var(--mono);font-size:.62rem;
  letter-spacing:.5px;cursor:pointer;transition:all .15s;
  flex-shrink:0;margin-top:4px;
}
.refresh-btn:hover{background:rgba(0,240,255,0.06);color:var(--cyan);border-color:rgba(0,240,255,0.35)}
.refresh-btn:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

/* ── YOUR RANK BANNER ── */
#my-rank-bar{
  display:none;padding:10px 24px;
  background:linear-gradient(90deg,rgba(32,96,255,0.08),rgba(128,64,255,0.06));
  border-bottom:1px solid rgba(0,240,255,0.1);
  font-family:var(--mono);font-size:.7rem;letter-spacing:.5px;
}
#my-rank-bar span{color:var(--cyan)}

/* ── TABLE ── */
.table-wrap{overflow-x:auto}
table{
  width:100%;border-collapse:collapse;
  font-family:var(--mono);font-size:.72rem;
}
thead th{
  padding:10px 16px;text-align:left;
  font-size:.55rem;letter-spacing:1.2px;text-transform:uppercase;
  color:rgba(0,240,255,0.4);font-weight:600;
  border-bottom:1px solid var(--border);
  background:rgba(0,240,255,0.02);
}
thead th:last-child{text-align:right}
tbody tr{
  border-bottom:1px solid rgba(255,255,255,0.03);
  transition:background .12s;
  animation:rowIn .3s ease both;
}
@keyframes rowIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
tbody tr:hover{background:rgba(0,240,255,0.03)}
tbody tr.my-row{background:rgba(32,96,255,0.07);border-left:2px solid rgba(0,240,255,0.3)}
tbody td{padding:11px 16px;color:var(--text);vertical-align:middle}
tbody td:last-child{text-align:right;color:var(--dim)}

.rank-cell{font-weight:700;font-size:.85rem;color:var(--dim);min-width:36px}
.rank-1{color:var(--gold);text-shadow:0 0 10px rgba(255,215,0,0.5)}
.rank-2{color:var(--silver)}
.rank-3{color:var(--bronze)}

.medal{font-size:1rem;margin-right:4px}

.contrib-id{
  font-family:var(--mono);font-size:.75rem;color:var(--cyan);
  letter-spacing:.5px;
}
.contrib-id.you::after{
  content:' (you)';font-size:.6rem;color:rgba(0,240,255,0.4);
}

.sub-count{
  font-size:.82rem;font-weight:700;color:var(--text-bright);
}
.signal-val{color:var(--cyan)}
.speed-val{color:var(--green)}

.carriers-badges{display:flex;gap:3px;flex-wrap:wrap}
.cbadge{
  padding:1px 5px;border-radius:2px;font-size:.55rem;font-weight:700;
  letter-spacing:.5px;background:rgba(0,240,255,0.08);color:rgba(0,240,255,0.6);
  border:1px solid rgba(0,240,255,0.15);
}

/* ── EMPTY STATE ── */
.empty-state{
  padding:48px 24px;text-align:center;
  font-family:var(--mono);color:var(--dim);font-size:.78rem;letter-spacing:.5px;
}
.empty-state .empty-icon{font-size:2rem;display:block;margin-bottom:12px;opacity:.3}

/* ── LOADER ── */
.loader{
  display:flex;gap:6px;justify-content:center;padding:32px;
}
.loader-dot{
  width:6px;height:6px;border-radius:50%;background:var(--cyan);opacity:.3;
  animation:pulse .9s ease-in-out infinite;
}
.loader-dot:nth-child(2){animation-delay:.15s}
.loader-dot:nth-child(3){animation-delay:.3s}
@keyframes pulse{50%{opacity:1;transform:scale(1.3)}}

/* ── FOOTER ── */
.card-foot{
  padding:12px 24px 16px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.back-link{
  font-family:var(--mono);font-size:.65rem;font-weight:600;
  color:rgba(0,240,255,0.5);text-decoration:none;
  letter-spacing:1px;text-transform:uppercase;transition:color .15s;
}
.back-link:hover{color:var(--cyan)}
.back-link:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
.privacy-note{font-family:var(--mono);font-size:.56rem;color:var(--dim);text-align:right;letter-spacing:.3px}

@media(max-width:520px){
  thead th:nth-child(4),tbody td:nth-child(4),
  thead th:nth-child(5),tbody td:nth-child(5){display:none}
  .card-head{flex-direction:column;gap:10px}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
@media(prefers-contrast:high){:root{--border:rgba(255,255,255,0.2);--dim:#6a7a8e}}
</style>
</head>
<body>

<a class="skip-link" href="#leaderboard-table">Skip to leaderboard</a>

<nav class="topbar" aria-label="Site navigation">
  <div class="nav-links" role="tablist">
    <a class="nav-link" href="/"            data-i18n="nav.map">Map</a>
    <a class="nav-link" href="/upload"      data-i18n="nav.contribute">Contribute</a>
    <a class="nav-link active" href="/leaderboard" aria-current="page" data-i18n="nav.leaderboard">Leaderboard</a>
    <a class="nav-link" href="/buildings"   data-i18n="nav.buildings">Buildings</a>
  </div>
  <div class="nav-right">
    <button class="lang-btn" id="lang-toggle" aria-label="Switch language">தமிழ்</button>
  </div>
</nav>

<main id="main-content" style="width:100%;max-width:680px;position:relative;z-index:1">
  <div class="card" role="region" aria-label="Top contributors leaderboard">
    <div class="scan-line" aria-hidden="true"></div>

    <div class="card-head">
      <div>
        <h1 data-i18n="lb.title">Leaderboard</h1>
        <p class="head-sub" data-i18n="lb.sub">Top contributors this session</p>
      </div>
      <button class="refresh-btn" id="refresh-btn" aria-label="Refresh leaderboard">↻ Refresh</button>
    </div>

    <div id="my-rank-bar" aria-live="polite"></div>

    <div class="table-wrap">
      <div id="loader" class="loader" aria-label="Loading leaderboard" role="status">
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
      </div>

      <table id="leaderboard-table" style="display:none" aria-label="Leaderboard table">
        <thead>
          <tr>
            <th scope="col" data-i18n="lb.rank">#</th>
            <th scope="col" data-i18n="lb.id">Contributor</th>
            <th scope="col" data-i18n="lb.subs">Submissions</th>
            <th scope="col" data-i18n="lb.signal">Avg Signal</th>
            <th scope="col" data-i18n="lb.speed">Avg Speed</th>
            <th scope="col" data-i18n="lb.last">Last Active</th>
          </tr>
        </thead>
        <tbody id="lb-body"></tbody>
      </table>

      <div id="empty-state" class="empty-state" style="display:none" role="status">
        <span class="empty-icon" aria-hidden="true">📡</span>
        <span data-i18n="lb.empty">No contributions yet. Be the first!</span>
      </div>
    </div>

    <div class="card-foot">
      <a href="/" class="back-link" data-i18n="back.map">← Back to Map</a>
      <span class="privacy-note">IDs are anonymised — only first 8 chars shown</span>
    </div>
  </div>
</main>

<script src="/static/i18n.js"></script>
<script>
"use strict";

const MY_ID = localStorage.getItem("vit_contributor_id") || "";
const MY_SHORT = MY_ID ? `VIT-${MY_ID.slice(0,8).toUpperCase()}` : "";

// Language toggle
const langBtn = document.getElementById("lang-toggle");
langBtn?.addEventListener("click", () => {
  const next = currentLang() === "en" ? "ta" : "en";
  setLang(next);
  langBtn.textContent = next === "ta" ? "EN" : "தமிழ்";
});
langBtn.textContent = currentLang() === "ta" ? "EN" : "தமிழ்";

const MEDALS = ["🥇","🥈","🥉"];

function formatRelativeTime(iso) {
  if (!iso) return "—";
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1)  return "just now";
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24)  return `${hrs}h ago`;
  return `${Math.floor(hrs/24)}d ago`;
}

async function loadLeaderboard() {
  document.getElementById("loader").style.display = "flex";
  document.getElementById("leaderboard-table").style.display = "none";
  document.getElementById("empty-state").style.display = "none";

  try {
    const res  = await fetch("/api/leaderboard?limit=20");
    const data = await res.json();

    document.getElementById("loader").style.display = "none";

    if (!data.length) {
      document.getElementById("empty-state").style.display = "block";
      return;
    }

    const tbody = document.getElementById("lb-body");
    tbody.innerHTML = "";

    const myRankBar = document.getElementById("my-rank-bar");
    let myRank = null;

    data.forEach((entry, i) => {
      const isMe = MY_SHORT && entry.display_id === MY_SHORT;
      if (isMe) myRank = entry.rank;

      const medal = i < 3 ? `<span class="medal" aria-hidden="true">${MEDALS[i]}</span>` : "";
      const rankClass = i === 0 ? "rank-1" : i === 1 ? "rank-2" : i === 2 ? "rank-3" : "";

      const tr = document.createElement("tr");
      tr.setAttribute("style", `animation-delay:${i * 40}ms`);
      if (isMe) tr.classList.add("my-row");

      tr.innerHTML = `
        <td class="rank-cell ${rankClass}" aria-label="Rank ${entry.rank}">${medal}${entry.rank}</td>
        <td>
          <span class="contrib-id ${isMe ? 'you' : ''}"
                aria-label="${isMe ? 'You: ' : ''}${entry.display_id}">
            ${entry.display_id}
          </span>
        </td>
        <td><span class="sub-count" aria-label="${entry.submissions} submissions">${entry.submissions.toLocaleString()}</span></td>
        <td><span class="signal-val">${entry.avg_signal != null ? entry.avg_signal + ' dBm' : '—'}</span></td>
        <td><span class="speed-val">${entry.avg_speed  != null ? entry.avg_speed  + ' Mbps': '—'}</span></td>
        <td>${formatRelativeTime(entry.last_active)}</td>
      `;
      tbody.appendChild(tr);
    });

    document.getElementById("leaderboard-table").style.display = "table";

    if (myRank) {
      myRankBar.style.display = "block";
      myRankBar.innerHTML = `📍 Your rank: <span>#${myRank}</span> as ${MY_SHORT}`;
      myRankBar.setAttribute("role", "status");
    }

  } catch (err) {
    document.getElementById("loader").style.display = "none";
    document.getElementById("empty-state").style.display = "block";
    document.getElementById("empty-state").textContent = "⚠️ Failed to load leaderboard.";
  }
}

document.getElementById("refresh-btn")?.addEventListener("click", loadLeaderboard);
document.addEventListener("langchange", () => {
  // Re-render table headers via i18n
  applyTranslations();
});

loadLeaderboard();
</script>
</body>
</html>
